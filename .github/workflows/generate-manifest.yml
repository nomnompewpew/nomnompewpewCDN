name: Generate Manifest

on:
  push:
    branches: [main]
    paths-ignore:
      - 'manifest.json'
      - '*/manifest.json'
      - 'cms/**'
      - '.github/**'
      - 'scripts/**'
      - '*.md'

jobs:
  manifest:
    name: Regenerate asset manifests
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate manifests
        run: npm run manifest

      - name: Commit updated manifests
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json */manifest.json
          git diff --cached --quiet || git commit -m "chore: regenerate asset manifests [skip ci]"
          git push
